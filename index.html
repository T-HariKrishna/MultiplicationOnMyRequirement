<!doctype html>
<html>
  <head>
    <title>Chained Multiplication</title>

    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      .row {
        margin-bottom: 10px;
      }

      input {
        width: 80px;
        padding: 5px;
        margin-right: 10px;
      }

      .result {
        font-weight: bold;
        margin: 0 10px;
      }

      button {
        padding: 8px 12px;
        margin-right: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h2>Chained Multiplication</h2>

    <div id="container">
      <div class="row">
        <input type="number" step="0.01" class="num1" placeholder="Num1" />
        <input type="number" step="0.01" class="num2" placeholder="Num2" />

        <span class="result">= 0</span>

        <input type="number" step="0.01" class="num3" placeholder="Next" />

        <span class="final">= 0</span>
      </div>
    </div>

    <br />

    <button onclick="addRow()">Add More</button>
    <button onclick="calculateTotal()">Calculate Total</button>

    <h3>Total: <span id="total">0</span></h3>

    <script>
      function addRow() {
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
        <input type="number" step="0.01" class="num1" placeholder="Num1">
        <input type="number" step="0.01" class="num2" placeholder="Num2">
        <span class="result">= 0</span>
        <input type="number" step="0.01" class="num3" placeholder="Next">
        <span class="final">= 0</span>
    `;

        document.getElementById("container").appendChild(div);
      }

      // Live calculation
      document.addEventListener("input", function () {
        const rows = document.querySelectorAll(".row");

        rows.forEach((row) => {
          const n1 = parseFloat(row.querySelector(".num1").value) || 0;
          const n2 = parseFloat(row.querySelector(".num2").value) || 0;
          const n3 = parseFloat(row.querySelector(".num3").value) || 0;

          const resultSpan = row.querySelector(".result");
          const finalSpan = row.querySelector(".final");

          let res1 = Math.floor(n1 * n2);
          resultSpan.innerText = "= " + res1;

          let final = Math.floor(res1 * n3);
          finalSpan.innerText = "= " + final;
        });
      });

      // Total sum
      function calculateTotal() {
        const rows = document.querySelectorAll(".row");
        let total = 0;

        rows.forEach((row) => {
          const n1 = parseFloat(row.querySelector(".num1").value) || 0;
          const n2 = parseFloat(row.querySelector(".num2").value) || 0;
          const n3 = parseFloat(row.querySelector(".num3").value) || 0;

          let res1 = Math.floor(n1 * n2);
          let final = Math.floor(res1 * n3);

          total += final;
        });

        document.getElementById("total").innerText = total;
      }
    </script>
  </body>
</html>
